<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dein täglicher Post-it 🐱</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf6f0;
      font-family: 'Quicksand', sans-serif;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(245,168,192,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(127,200,212,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 60% 10%, rgba(196,170,94,0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .date-label {
      font-size: 13px;
      color: #b09a8a;
      letter-spacing: 0.06em;
      text-transform: lowercase;
    }

    .postit-scene {
      width: 260px;
      height: 290px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.13));
    }

    .postit {
      width: 250px;
      height: 275px;
      border-radius: 3px 3px 6px 6px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    }

    .postit::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 30px;
      background: rgba(0,0,0,0.07);
      border-radius: 3px 3px 0 0;
      z-index: 0;
    }

    .postit:hover { transform: translateY(-6px) rotate(-1.2deg); }

    .postit.pink-note  { background: #F5A8C0; }
    .postit.blue-note  { background: #7FC8D4; }
    .postit.gold-note  { background: #C4AA5E; }

    .quote-area {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 48px 22px 0 22px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quote-text {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.6;
      color: rgba(0,0,0,0.68);
    }

    .quote-text.emoji-only { font-size: 52px; line-height: 1; }

    .cat-img {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .cat-svg { width: 185px; height: 105px; display: block; }

    .btn {
      background: white;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 50px;
      padding: 10px 26px;
      font-family: 'Quicksand', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .btn:hover { background: #fff0f5; color: #c07090; transform: scale(1.03); }
    .btn:active { transform: scale(0.97); }

    .hint {
      font-size: 12px;
      color: #c0a898;
      text-align: center;
    }

    @keyframes flipIn {
      0%   { transform: rotateY(90deg) scale(0.85); opacity: 0; }
      100% { transform: rotateY(0deg)  scale(1);    opacity: 1; }
    }
    .flip-anim { animation: flipIn 0.45s cubic-bezier(.34,1.3,.64,1) both; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="date-label" id="dateLabel"></div>

    <div class="postit-scene">
      <div class="postit" id="postit" onclick="flipNote()">
        <div class="quote-area">
          <p class="quote-text" id="quoteText"></p>
        </div>
        <div class="cat-img" id="catImg"></div>
      </div>
    </div>

    <button class="btn" onclick="flipNote()">Neue Notiz ziehen ↺</button>
    <p class="hint">Täglich eine neue Affirmation für dich 🐱</p>
  </div>

<script>
const affirmations = [
  "Du bist genug — genau so, wie du bist.",
  "Deine Stärke ist größer als jede Herausforderung.",
  "Du verdienst Liebe und Freundlichkeit — auch von dir selbst.",
  "Jeder Tag ist ein neuer Anfang.",
  "Du bist wertvoller, als du manchmal glaubst.",
  "Deine Gefühle sind gültig. Immer.",
  "Du wächst, auch wenn du es nicht siehst.",
  "Fehler sind kein Versagen — sie sind der Weg.",
  "Du hast schon so vieles überstanden. Du schaffst das.",
  "Du bist nicht allein — ich denke an dich.",
  "Dein Bestes ist immer gut genug.",
  "Du trägst Licht in dich — auch an dunklen Tagen.",
  "Du bist mutig, auch wenn es sich nicht so anfühlt.",
  "Deine Anwesenheit macht einen Unterschied.",
  "Es ist okay, heute langsam zu sein.",
  "Du darfst Hilfe annehmen. Das ist Stärke.",
  "Was du beiträgst, hat Bedeutung.",
  "Du bist liebenswert — weil du du bist.",
  "Kleine Schritte zählen genauso.",
  "Heute reicht es, einfach hier zu sein.",
  "Du hast das Recht, Grenzen zu setzen.",
  "Deine Geschichte ist es wert, erzählt zu werden.",
  "Du bist nicht deine schlechtesten Tage.",
  "Ruh dich aus — das ist keine Schwäche, das ist Weisheit.",
  "Du verdienst Freude und Leichtigkeit.",
  "Vertrau dir selbst ein bisschen mehr.",
  "Es ist okay, nicht perfekt zu sein.",
  "Du machst den Unterschied — auch wenn du es nicht siehst.",
  "Deine Gedanken und Ideen haben Wert.",
  "Du bist auf dem richtigen Weg.",
  "Du bist ein guter Mensch — das spüren andere.",
  "Heute darfst du dir selbst vergeben.",
  "Deine Freude ist keine Kleinigkeit.",
  "Du verdienst eine Pause.",
  "Alles, was du durchgemacht hast, hat dich geformt — und du bist stark.",
  "Dein Herz ist groß. Vergiss das nicht.",
  "Ich hab dich gern :)",
  "Sei lieb zu dir!",
  "🩷",
  "Pass auf dich auf.",
  "Babycakes, you doing fine.",
  "Termin?",
];

const cats = ['pink', 'blue', 'gold'];

const catSVGs = {
  pink: `<svg class="cat-svg" viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="18" y="20" width="144" height="80" rx="14" fill="#2a2a2a"/>
    <rect x="18" y="20" width="144" height="30" rx="14" fill="#3a3a3a"/>
    <ellipse cx="62" cy="22" rx="14" ry="18" fill="#2a2a2a" transform="rotate(-15 62 22)"/>
    <ellipse cx="118" cy="22" rx="14" ry="18" fill="#2a2a2a" transform="rotate(15 118 22)"/>
    <ellipse cx="62" cy="20" rx="8" ry="11" fill="#c9a090" transform="rotate(-15 62 20)"/>
    <ellipse cx="118" cy="20" rx="8" ry="11" fill="#c9a090" transform="rotate(15 118 20)"/>
    <ellipse cx="90" cy="58" rx="38" ry="36" fill="#3d3d3d"/>
    <ellipse cx="73" cy="54" rx="12" ry="14" fill="#f5f0e8"/>
    <ellipse cx="107" cy="54" rx="12" ry="14" fill="#f5f0e8"/>
    <circle cx="73" cy="55" r="8" fill="#3a2810"/>
    <circle cx="107" cy="55" r="8" fill="#3a2810"/>
    <circle cx="75" cy="53" r="3" fill="white"/>
    <circle cx="109" cy="53" r="3" fill="white"/>
    <ellipse cx="90" cy="70" rx="8" ry="6" fill="#e8a0aa"/>
    <circle cx="90" cy="69" r="3" fill="#d47880"/>
  </svg>`,
  blue: `<svg class="cat-svg" viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="22" width="140" height="78" rx="14" fill="#d4834a"/>
    <ellipse cx="60" cy="26" rx="13" ry="17" fill="#d4834a" transform="rotate(-12 60 26)"/>
    <ellipse cx="120" cy="26" rx="13" ry="17" fill="#d4834a" transform="rotate(12 120 26)"/>
    <ellipse cx="60" cy="24" rx="7" ry="10" fill="#e8b090" transform="rotate(-12 60 24)"/>
    <ellipse cx="120" cy="24" rx="7" ry="10" fill="#e8b090" transform="rotate(12 120 24)"/>
    <ellipse cx="90" cy="60" rx="40" ry="36" fill="#e8944a"/>
    <ellipse cx="68" cy="56" rx="14" ry="15" fill="#f5f0e8"/>
    <ellipse cx="112" cy="56" rx="14" ry="15" fill="#f5f0e8"/>
    <circle cx="68" cy="57" r="10" fill="#2a1a08"/>
    <circle cx="112" cy="57" r="10" fill="#2a1a08"/>
    <circle cx="70" cy="54" r="4" fill="white"/>
    <circle cx="114" cy="54" r="4" fill="white"/>
    <ellipse cx="90" cy="73" rx="7" ry="5" fill="#d4a090"/>
    <line x1="90" y1="73" x2="90" y2="77" stroke="#b08070" stroke-width="1.5"/>
  </svg>`,
  gold: `<svg class="cat-svg" viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="16" y="18" width="148" height="82" rx="14" fill="#1a1a1a"/>
    <ellipse cx="56" cy="22" rx="15" ry="19" fill="#1a1a1a" transform="rotate(-10 56 22)"/>
    <ellipse cx="124" cy="22" rx="15" ry="19" fill="#1a1a1a" transform="rotate(10 124 22)"/>
    <ellipse cx="56" cy="20" rx="8" ry="11" fill="#9a7a60" transform="rotate(-10 56 20)"/>
    <ellipse cx="124" cy="20" rx="8" ry="11" fill="#9a7a60" transform="rotate(10 124 20)"/>
    <ellipse cx="90" cy="58" rx="42" ry="36" fill="#252525"/>
    <ellipse cx="67" cy="54" rx="15" ry="16" fill="#f0d890"/>
    <ellipse cx="113" cy="54" rx="15" ry="16" fill="#f0d890"/>
    <circle cx="67" cy="55" r="11" fill="#1a1000"/>
    <circle cx="113" cy="55" r="11" fill="#1a1000"/>
    <circle cx="69" cy="52" r="4" fill="white"/>
    <circle cx="115" cy="52" r="4" fill="white"/>
    <ellipse cx="90" cy="72" rx="7" ry="5" fill="#d4a090"/>
    <line x1="56" y1="18" x2="38" y2="10" stroke="#666" stroke-width="1.2"/>
    <line x1="58" y1="20" x2="36" y2="18" stroke="#666" stroke-width="1.2"/>
    <line x1="60" y1="23" x2="38" y2="26" stroke="#666" stroke-width="1.2"/>
    <line x1="124" y1="18" x2="142" y2="10" stroke="#666" stroke-width="1.2"/>
    <line x1="122" y1="20" x2="144" y2="18" stroke="#666" stroke-width="1.2"/>
    <line x1="120" y1="23" x2="142" y2="26" stroke="#666" stroke-width="1.2"/>
  </svg>`
};

const noteColors = { pink: 'pink-note', blue: 'blue-note', gold: 'gold-note' };

function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

function formatDate() {
  return new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

let currentIndex = getDayOfYear() % affirmations.length;
let currentCatIndex = getDayOfYear() % 3;

function renderNote(animate) {
  const postit = document.getElementById('postit');
  const quoteText = document.getElementById('quoteText');
  const catImg = document.getElementById('catImg');
  const cat = cats[currentCatIndex];
  postit.className = 'postit ' + noteColors[cat];
  const text = affirmations[currentIndex];
  quoteText.textContent = text;
  quoteText.className = text === '🩷' ? 'quote-text emoji-only' : 'quote-text';
  catImg.innerHTML = catSVGs[cat];
  if (animate) {
    postit.classList.remove('flip-anim');
    void postit.offsetWidth;
    postit.classList.add('flip-anim');
  }
}

function flipNote() {
  currentIndex = (currentIndex + 1) % affirmations.length;
  currentCatIndex = (currentCatIndex + 1) % 3;
  renderNote(true);
}

document.getElementById('dateLabel').textContent = formatDate();
renderNote(false);
</script>
</body>
</html>
